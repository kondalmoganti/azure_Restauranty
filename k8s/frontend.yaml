apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: restauranty-km
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: restaurantykm2468.azurecr.io/restauranty-client:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: restauranty-km
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
